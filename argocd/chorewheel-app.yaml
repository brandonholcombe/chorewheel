apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chorewheel
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/brandonholcombe/chorewheel.git
    targetRevision: HEAD
    path: K8s
  destination:
    server: https://kubernetes.default.svc
    namespace: chorewheel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  revisionHistoryLimit: 3
